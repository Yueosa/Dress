name: Strip EXIF Data

# Triggered by maintainers commenting "/strip-exif" on a PR.
# Automatically removes EXIF metadata from image files without reading/displaying
# the content, protecting contributor privacy.
# Note: Only works for PRs from the same repository, not from forks.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  strip-exif:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/strip-exif')
    runs-on: ubuntu-latest
    steps:
      - name: Check user permission
        id: check-perm
        uses: actions-cool/check-user-permission@v2.2.0
        with:
          require: write

      - name: Get PR details
        if: steps.check-perm.outputs.require-result == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const headRepo = pr.data.head.repo.full_name;
            const baseRepo = `${context.repo.owner}/${context.repo.repo}`;
            const isFork = headRepo !== baseRepo;
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('is_fork', isFork.toString());

      - name: Post fork notice
        if: steps.check-perm.outputs.require-result == 'true' && steps.pr.outputs.is_fork == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '⚠️ 自动去除 EXIF 功能暂不支持来自 Fork 的 PR。请在本地执行以下命令后重新推送：',
                '⚠️ Auto EXIF stripping is not supported for PRs from forks. Please run the following command locally and push again:',
                '',
                '```bash',
                'exiftool -all= -overwrite_original <your_image_files>',
                '```',
              ].join('\n')
            });

      - name: Checkout PR branch
        if: steps.check-perm.outputs.require-result == 'true' && steps.pr.outputs.is_fork != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install exiftool
        if: steps.check-perm.outputs.require-result == 'true' && steps.pr.outputs.is_fork != 'true'
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Strip EXIF data from images
        if: steps.check-perm.outputs.require-result == 'true' && steps.pr.outputs.is_fork != 'true'
        run: |
          # Strip EXIF data from all image files without reading/displaying content
          find . -type f \( \
            -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o \
            -iname "*.webp" -o -iname "*.tiff" -o -iname "*.tif" -o \
            -iname "*.heic" -o -iname "*.heif" -o -iname "*.avif" \
          \) -not -path "./.git/*" \
            -exec exiftool -all= -overwrite_original {} + 2>/dev/null || true

      - name: Commit and push changes
        if: steps.check-perm.outputs.require-result == 'true' && steps.pr.outputs.is_fork != 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto-strip EXIF data from images"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment result
        if: steps.check-perm.outputs.require-result == 'true' && steps.pr.outputs.is_fork != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const hasChanges = '${{ steps.commit.outputs.has_changes }}' === 'true';
            const body = hasChanges
              ? '✅ 已自动移除图片中的 EXIF 数据并提交。\n✅ EXIF data has been automatically stripped from images and committed.'
              : '✅ 未检测到需要移除的 EXIF 数据。\n✅ No EXIF data found to remove.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
